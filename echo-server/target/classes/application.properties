# ==================================================
# DB接続モード切替
#   true  : Oracle DB に接続する
#   false : DB接続なしで動作する（echo のみ）
# ==================================================
db.enabled=false

# ==================================================
# Oracle DB 接続設定
# db.enabled=true の場合のみ使用されます。
# <...> のプレースホルダを実際の値に置き換えてください。
# ==================================================
db.url=jdbc:oracle:thin:@//<db-host>:<db-port>/<db-service-name>
db.username=<db-username>
db.password=<db-password>
db.driver=oracle.jdbc.OracleDriver

# 接続プール設定
db.pool.maxActive=10
db.pool.minIdle=2
db.pool.connectionTimeout=30000

# ==================================================
# アプリケーション設定
# ==================================================
app.name=echo-server
app.version=1.0.0
