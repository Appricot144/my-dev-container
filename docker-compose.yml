services:
  # ── 開発用コンテナ ────────────────────────────────────────────
  dev:
    build:
      context: .devcontainer
      dockerfile: Dockerfile
      args:
        # WSL 側のユーザー ID を渡してファイル権限を揃える
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
        USERNAME: ${USERNAME:-vscode}
    entrypoint: ["/usr/local/bin/entry.sh"]
    volumes:
      - ./:/workspace # プロジェクトルートをコンテナの/workspaceに展開
      - maven-cache:/home/${USERNAME:-vscode}/.m2 # Maven キャッシュ
      # WAR デプロイ用ボリューム
      - webapps-a1:/deploy/product-a/server1
      # - webapps-a2:/deploy/product-a/server2
      # - webapps-b1:/deploy/product-b/server1
      # - webapps-b2:/deploy/product-b/server2
      # - webapps-c1:/deploy/product-c/server1
      # - webapps-c2:/deploy/product-c/server2
    networks:
      - app-network

  # ── Apache リバースプロキシ用 ─────────────────────────────────
  # Apache コンテナ は dev container と一緒に起動
  proxy:
    image: httpd:2.4
    volumes:
      - ./.docker/apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
    ports:
      - "8080:8080"
    networks:
      - app-network

  # ════════════════════════════════════════════════════════════
  # 製品A のサーバ群
  # profile: product-a
  # ════════════════════════════════════════════════════════════
  product-a-1:
    build:
      context: . # lib/common/ を参照するためルートを指定
      dockerfile: .docker/product-a/server-1/Dockerfile
      args:
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - CATALINA_OPTS=-Xmx512m # サーバごとに調整
    profiles: ["product-a"]
    volumes:
      - webapps-a1:/opt/tomcat/webapps # dev と共有（WAR の自動反映）
      - ./product-a/server1/conf:/opt/tomcat/conf # server.xml 等（差分はここで吸収）
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s # サーバ起動にかかる時間がまちまちなので、ここも調整ポイント

