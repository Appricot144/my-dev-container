services:
  # ── 開発用コンテナ ────────────────────────────────────────────
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
      args:
        # WSL 側のユーザー ID を渡してファイル権限を揃える
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
        USERNAME: ${USERNAME:-vscode}
        DOCKER_GID: ${DOCKER_GID:-997}
    user: "${USERNAME:-vscode}"
    environment:
      - DB_SCHEMA="${DB_SCHEMA:-TEST_SCHEMA}"
    entrypoint: ["/usr/local/bin/entry.sh"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./:${HOST_WORKSPACE}/${PROJECT}
      - maven-cache:/home/${USERNAME:-vscode}/.m2
      # war deploy volumes
      - echo-restapi-dv:/deploy/echo/rest-api
      - echo-web-dv:/deploy/echo/web
      - message-web-dv:/deploy/message/web
      # source volumes (other projects)
      - ${HOST_WORKSPACE}/dev-env:${HOST_WORKSPACE}/dev-env:ro
      - ${HOST_WORKSPACE}/Message:${HOST_WORKSPACE}/Message:ro
    networks:
      - app-network

  # ════════════════════════════════════════════════════════════
  # echo-server のサーバ群
  # profile: echo
  # ════════════════════════════════════════════════════════════
  echo-restapi:
    build:
      context: .
      dockerfile: ../dev-env/server-base/Dockerfile
      args:
        USERNAME: ${USERNAME:-vscode}
        USER_UID: ${UID:-1000}
        USER_GID: ${GID:-1000}
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - CATALINA_OPTS=-Xmx512m # サーバごとに調整
    profiles: ["echo"]
    volumes:
      - echo-restapi-dv:/opt/tomcat/webapps # war deploy volume
      - ./conf:/opt/tomcat/conf # server conf (server.xml etc...)
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  echo-web:
    build:
      context: .
      dockerfile: ../dev-env/server-base/Dockerfile
    profiles: ["echo"]
    volumes:
      - echo-web-dv:/opt/tomcat/webapps
      - ./conf:/opt/tomcat/conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ════════════════════════════════════════════════════════════
  # message-server のサーバ群
  # profile: message
  # ════════════════════════════════════════════════════════════
  message-web:
    build:
      context: .
      dockerfile: ../dev-env/server-base/Dockerfile
    profiles: ["message"]
    volumes:
      - message-web-dv:/opt/tomcat/webapps
      - ../Message/Message-Web/conf:/opt/tomcat/conf
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

# ── ネットワーク ──────────────────────────────────────────────
networks:
  app-network:
    external: true

# ── ボリューム ────────────────────────────────────────────────
volumes:
  # Maven cache
  maven-cache:
    name: maven-cache
  # war deploy volumes
  echo-restapi-dv:
    external: true
  echo-web-dv:
    external: true
  message-web-dv:
    external: true
