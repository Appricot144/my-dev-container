# ── ネットワーク ──────────────────────────────────────────────
# 同一ネットワーク内ではサービス名でアクセスできる
# 例：http://product-a-1:8080/myapp
networks:
  app-network:
    driver: bridge

# ── ボリューム ────────────────────────────────────────────────
volumes:
  maven-cache: # Maven の依存関係キャッシュ
  webapps-a1: # 製品A server1 への WAR デプロイ用
  # webapps-a2:     # 製品A server2 への WAR デプロイ用
